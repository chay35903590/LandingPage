name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx @cloudflare/next-on-pages

      - name: Setup Wrangler auth
        run: |
          mkdir -p ~/.config/.wrangler/config
          echo "${{ secrets.WRANGLER_CONFIG }}" > ~/.config/.wrangler/config/default.toml

      - name: Deploy
        run: npx wrangler pages deploy .vercel/output/static --project-name landing-page --branch master
        env:
          CLOUDFLARE_ACCOUNT_ID: 75c73b563d11791ad364f505b212d448
          CI: ""
